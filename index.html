<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEON LINK // Puzzle Matrix</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-cyan: #00f3ff;
            --neon-pink: #ff0055;
            --neon-purple: #9d00ff;
            --neon-green: #00ff66;
            --neon-yellow: #ffb700;
            --bg-dark: #0a0a12;
            --panel-bg: rgba(16, 16, 28, 0.75);
        }

        * {
            box-sizing: border-box;
            user-select: none;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-dark);
            color: #ffffff;
            font-family: 'Rajdhani', sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(26, 21, 44, 0.5) 0%, transparent 80%),
                linear-gradient(rgba(18, 16, 26, 0.8) 2px, transparent 2px),
                linear-gradient(90deg, rgba(18, 16, 26, 0.8) 2px, transparent 2px);
            background-size: 100% 100%, 30px 30px, 30px 30px;
        }

        #game-container {
            position: relative;
            width: 600px;
            height: 700px;
            background: rgba(5, 5, 10, 0.85);
            border: 2px solid rgba(0, 243, 255, 0.2);
            border-radius: 12px;
            box-shadow: 0 0 40px rgba(0, 243, 255, 0.1), inset 0 0 20px rgba(157, 0, 255, 0.1);
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(6, 6, 10, 0.95);
            backdrop-filter: blur(8px);
            z-index: 10;
            transition: opacity 0.4s ease, visibility 0.4s ease;
            text-align: center;
        }

        .overlay.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 3.5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 10px;
            color: #fff;
            text-shadow: 0 0 10px var(--neon-cyan), 0 0 30px var(--neon-purple);
            animation: pulse 3s infinite alternate;
        }

        .subtitle {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 30px;
        }

        .menu-btn {
            font-family: 'Orbitron', sans-serif;
            background: transparent;
            color: #fff;
            border: 2px solid var(--neon-cyan);
            padding: 14px 40px;
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.2);
        }

        .menu-btn:hover {
            background: var(--neon-cyan);
            color: var(--bg-dark);
            box-shadow: 0 0 30px var(--neon-cyan);
            transform: translateY(-2px);
        }

        #hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 25px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: none;
            font-family: 'Orbitron', sans-serif;
            z-index: 5;
        }

        .hud-element {
            display: flex;
            flex-direction: column;
        }

        .hud-label {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 2px;
        }

        .hud-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: #fff;
        }

        .hud-value.cyan { color: var(--neon-cyan); text-shadow: 0 0 10px rgba(0, 243, 255, 0.5); }
        .hud-value.pink { color: var(--neon-pink); text-shadow: 0 0 10px rgba(255, 0, 85, 0.5); }
        .hud-value.purple { color: var(--neon-purple); text-shadow: 0 0 10px rgba(157, 0, 255, 0.5); }

        .instructions {
            background: var(--panel-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 25px;
            border-radius: 8px;
            max-width: 450px;
            margin-bottom: 40px;
            direction: rtl;
            line-height: 1.6;
        }

        .instructions p {
            margin-bottom: 12px;
            font-size: 1.05rem;
            color: rgba(255, 255, 255, 0.8);
        }

        .highlight { color: var(--neon-cyan); font-weight: 700; }
        .highlight-pink { color: var(--neon-pink); font-weight: 700; }

        #game-over-screen h1 {
            color: var(--neon-pink);
            text-shadow: 0 0 10px var(--neon-pink), 0 0 30px var(--neon-purple);
        }
        #game-over-screen .menu-btn {
            border-color: var(--neon-pink);
        }
        #game-over-screen .menu-btn:hover {
            background: var(--neon-pink);
            box-shadow: 0 0 30px var(--neon-pink);
        }

        .timer-bar-container {
            position: absolute;
            top: 85px;
            left: 30px;
            width: calc(100% - 60px);
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
            z-index: 5;
        }

        #timer-bar {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-purple));
            box-shadow: 0 0 10px var(--neon-cyan);
            transition: width 0.1s linear;
        }

        @keyframes pulse {
            0% { opacity: 0.9; text-shadow: 0 0 10px var(--neon-cyan), 0 0 20px var(--neon-purple); }
            100% { opacity: 1; text-shadow: 0 0 15px var(--neon-cyan), 0 0 35px var(--neon-cyan), 0 0 50px var(--neon-purple); }
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="hud">
            <div class="hud-element">
                <span class="hud-label">Score</span>
                <span id="score-display" class="hud-value cyan">00000</span>
            </div>
            <div class="hud-element" style="text-align: right;">
                <span class="hud-label">Moves Left</span>
                <span id="moves-display" class="hud-value pink">20</span>
            </div>
        </div>

        <div class="timer-bar-container">
            <div id="timer-bar"></div>
        </div>

        <div id="start-screen" class="overlay">
            <h1>NEON LINK</h1>
            <div class="subtitle">Matrix Connect Puzzle</div>
            <div class="instructions">
                <p>کاشی‌های نئونی <span class="highlight">هم‌رنگ</span> رو با کشیدن موس یا انگشت به هم وصل کن.</p>
                <p>باید حداقل <span class="highlight-pink">۳ کاشی</span> رو متصل کنی تا زنجیره منفجر بشه.</p>
                <p>حرکت‌های مورب (کج) هم مجاز هستن!</p>
                <p>مواظب <span class="highlight">زمان</span> و تعداد حرکت‌هات باش.</p>
            </div>
            <button id="start-btn" class="menu-btn">شروع اتصال</button>
        </div>

        <div id="game-over-screen" class="overlay hidden">
            <h1>MATRIX TERMINATED</h1>
            <div class="subtitle">No Energy Remaining</div>
            <div style="margin-bottom: 30px;">
                <div class="hud-label">Final Score</div>
                <div id="final-score" class="hud-value cyan" style="font-size: 3rem;">0</div>
            </div>
            <button id="restart-btn" class="menu-btn">اتصال مجدد</button>
        </div>

        <canvas id="gameCanvas" width="600" height="700"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // UI elements
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over-screen');
        const startBtn = document.getElementById('start-btn');
        const restartBtn = document.getElementById('restart-btn');
        const scoreDisplay = document.getElementById('score-display');
        const movesDisplay = document.getElementById('moves-display');
        const timerBar = document.getElementById('timer-bar');
        const finalScore = document.getElementById('final-score');

        const COLORS = [
            '#00f3ff', // Cyan
            '#ff0055', // Pink
            '#9d00ff', // Purple
            '#00ff66', // Green
            '#ffb700'  // Yellow
        ];

        // Grid configurations
        const gridRows = 6;
        const gridCols = 6;
        const tileSize = 75;
        const gridOffsetX = 75;
        const gridOffsetY = 160;

        let state = 'START';
        let score = 0;
        let moves = 20;
        let timePercent = 100;
        let grid = [];
        let currentChain = [];
        let isDrawing = false;
        let particles = [];
        let screenShake = 0;

        class Tile {
            constructor(row, col, colorIndex) {
                this.row = row;
                this.col = col;
                this.colorIndex = colorIndex;
                this.color = COLORS[colorIndex];
                this.x = gridOffsetX + col * tileSize + tileSize / 2;
                this.y = gridOffsetY + row * tileSize + tileSize / 2;
                this.targetY = this.y;
                this.yOffset = -500 - (row * 100); // Animation start from top
                this.scale = 1;
                this.pulseTimer = Math.random() * Math.PI * 2;
            }

            update() {
                // Drop animation smooth physics
                if (this.yOffset < 0) {
                    this.yOffset += (0 - this.yOffset) * 0.15;
                    if (Math.abs(this.yOffset) < 1) this.yOffset = 0;
                }
                this.pulseTimer += 0.05;
            }

            draw() {
                const drawY = this.y + this.yOffset;
                const isSelected = currentChain.includes(this);
                
                ctx.save();
                ctx.translate(this.x, drawY);
                
                // Pulsing effect for interactive visuals
                let pulse = 1;
                if (isSelected) {
                    pulse = 1.1 + Math.sin(this.pulseTimer * 2) * 0.05;
                    ctx.shadowBlur = 25;
                    ctx.shadowColor = this.color;
                } else {
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = this.color;
                }
                ctx.scale(pulse, pulse);

                // Draw Neon Node Box
                ctx.strokeStyle = this.color;
                ctx.lineWidth = isSelected ? 4 : 2;
                ctx.fillStyle = isSelected ? `rgba(${hexToRgb(this.color)}, 0.3)` : 'rgba(20, 20, 35, 0.6)';
                
                ctx.beginPath();
                ctx.roundRect(-tileSize/2 + 6, -tileSize/2 + 6, tileSize - 12, tileSize - 12, 10);
                ctx.fill();
                ctx.stroke();

                // Inner core design
                ctx.shadowBlur = 0;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(0, 0, 6, 0, Math.PI * 2);
                ctx.fill();

                ctx.restore();
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                let angle = Math.random() * Math.PI * 2;
                let speed = Math.random() * 5 + 2;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.alpha = 1;
                this.decay = Math.random() * 0.02 + 0.015;
                this.radius = Math.random() * 3 + 1.5;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.alpha -= this.decay;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.shadowBlur = 8;
                ctx.shadowColor = this.color;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        function hexToRgb(hex) {
            let result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? `${parseInt(result[1], 16)}, ${parseInt(result[2], 16)}, ${parseInt(result[3], 16)}` : '255,255,255';
        }

        function initGrid() {
            grid = [];
            for (let r = 0; r < gridRows; r++) {
                grid[r] = [];
                for (let c = 0; c < gridCols; c++) {
                    grid[r][c] = new Tile(r, c, Math.floor(Math.random() * COLORS.length));
                }
            }
        }

        function getMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            return {
                x: (e.clientX || (e.touches && e.touches[0].clientX)) - rect.left,
                y: (e.clientY || (e.touches && e.touches[0].clientY)) - rect.top
            };
        }

        function getTileAtPos(x, y) {
            for (let r = 0; r < gridRows; r++) {
                for (let c = 0; c < gridCols; c++) {
                    const tile = grid[r][c];
                    if (tile && 
                        x >= tile.x - tileSize/2 && x <= tile.x + tileSize/2 &&
                        y >= tile.y - tileSize/2 && y <= tile.y + tileSize/2) {
                        return tile;
                    }
                }
            }
            return null;
        }

        function isAdjacent(tile1, tile2) {
            return Math.abs(tile1.row - tile2.row) <= 1 && Math.abs(tile1.col - tile2.col) <= 1;
        }

        // Logic interaction functions
        function handleStart(e) {
            if (state !== 'PLAYING') return;
            const pos = getMousePos(e);
            const tile = getTileAtPos(pos.x, pos.y);
            if (tile) {
                isDrawing = true;
                currentChain = [tile];
            }
        }

        function handleMove(e) {
            if (!isDrawing || state !== 'PLAYING') return;
            const pos = getMousePos(e);
            const tile = getTileAtPos(pos.x, pos.y);

            if (tile && currentChain.length > 0) {
                const lastTile = currentChain[currentChain.length - 1];
                
                // Undo movement if player drags back to previous tile
                if (currentChain.length > 1 && tile === currentChain[currentChain.length - 2]) {
                    currentChain.pop();
                    return;
                }

                if (!currentChain.includes(tile) && tile.colorIndex === lastTile.colorIndex && isAdjacent(lastTile, tile)) {
                    currentChain.push(tile);
                }
            }
        }

        function handleEnd() {
            if (!isDrawing) return;
            isDrawing = false;

            if (currentChain.length >= 3) {
                // Match confirmed, eliminate nodes!
                score += currentChain.length * 150;
                moves--;
                timePercent = Math.min(100, timePercent + currentChain.length * 4); // Refill timer slightly
                screenShake = 8;

                // Burst particles
                currentChain.forEach(tile => {
                    for (let i = 0; i < 12; i++) {
                        particles.push(new Particle(tile.x, tile.y, tile.color));
                    }
                    grid[tile.row][tile.col] = null;
                });

                refillGrid();
                updateHUD();
                checkGameOver();
            }

            currentChain = [];
        }

        function refillGrid() {
            // Drop existing tiles down
            for (let c = 0; c < gridCols; c++) {
                let emptySpaces = 0;
                for (let r = gridRows - 1; r >= 0; r--) {
                    if (grid[r][c] === null) {
                        emptySpaces++;
                    } else if (emptySpaces > 0) {
                        grid[r + emptySpaces][c] = grid[r][c];
                        grid[r + emptySpaces][c].row = r + emptySpaces;
                        grid[r + emptySpaces][c].targetY = gridOffsetY + (r + emptySpaces) * tileSize + tileSize / 2;
                        grid[r + emptySpaces][c].y = grid[r + emptySpaces][c].targetY; // teleport but smoothly drop
                        grid[r][c] = null;
                    }
                }

                // Spawn new tiles at top
                for (let r = 0; r < emptySpaces; r++) {
                    grid[r][c] = new Tile(r, c, Math.floor(Math.random() * COLORS.length));
                }
            }
        }

        function updateHUD() {
            scoreDisplay.textContent = String(score).padStart(5, '0');
            movesDisplay.textContent = moves;
        }

        function checkGameOver() {
            if (moves <= 0 || timePercent <= 0) {
                state = 'GAMEOVER';
                finalScore.textContent = score;
                gameOverScreen.classList.remove('hidden');
            }
        }

        function startEngine() {
            score = 0;
            moves = 20;
            timePercent = 100;
            particles = [];
            currentChain = [];
            initGrid();
            updateHUD();
            state = 'PLAYING';
        }

        // Loop Runner
        function loop() {
            ctx.save();
            if (screenShake > 0) {
                let dx = (Math.random() - 0.5) * screenShake;
                let dy = (Math.random() - 0.5) * screenShake;
                ctx.translate(dx, dy);
                screenShake *= 0.9;
                if (screenShake < 0.2) screenShake = 0;
            }

            ctx.clearRect(-20, -20, canvas.width + 40, canvas.height + 40);

            if (state === 'PLAYING') {
                // Time Management
                timePercent -= 0.05 + (score * 0.00002); // Accelerate slowly with score
                if (timePercent < 0) timePercent = 0;
                timerBar.style.width = `${timePercent}%`;
                checkGameOver();

                // Draw Connections Line
                if (currentChain.length > 0) {
                    ctx.save();
                    ctx.strokeStyle = currentChain[0].color;
                    ctx.lineWidth = 6;
                    ctx.lineCap = 'round';
                    ctx.lineJoin = 'round';
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = currentChain[0].color;

                    ctx.beginPath();
                    ctx.moveTo(currentChain[0].x, currentChain[0].y + currentChain[0].yOffset);
                    for (let i = 1; i < currentChain.length; i++) {
                        ctx.lineTo(currentChain[i].x, currentChain[i].y + currentChain[i].yOffset);
                    }
                    ctx.stroke();
                    ctx.restore();
                }

                // Update & Render Grid Matrix
                for (let r = 0; r < gridRows; r++) {
                    for (let c = 0; c < gridCols; c++) {
                        if (grid[r][c]) {
                            grid[r][c].update();
                            grid[r][c].draw();
                        }
                    }
                }

                // Render FX Clouds
                for (let i = particles.length - 1; i >= 0; i--) {
                    particles[i].update();
                    particles[i].draw();
                    if (particles[i].alpha <= 0) particles.splice(i, 1);
                }
            }

            ctx.restore();
            requestAnimationFrame(loop);
        }

        // Events Wireframe Bindings
        canvas.addEventListener('mousedown', handleStart);
        canvas.addEventListener('mousemove', handleMove);
        window.addEventListener('mouseup', handleEnd);

        canvas.addEventListener('touchstart', handleStart, { passive: true });
        canvas.addEventListener('touchmove', handleMove, { passive: true });
        window.addEventListener('touchend', handleEnd);

        startBtn.addEventListener('click', () => {
            startScreen.classList.add('hidden');
            startEngine();
        });

        restartBtn.addEventListener('click', () => {
            gameOverScreen.classList.add('hidden');
            startEngine();
        });

        // Run Engine Loop
        requestAnimationFrame(loop);
    </script>
</body>
</html>
